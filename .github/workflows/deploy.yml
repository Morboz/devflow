name: deploy

# Continuous deployment to the single VM. Self-contained: it re-runs the test
# gate first so a direct push to main can never deploy red code, then SSHes in
# and runs scripts/deploy.sh (pull → install → migrate → restart).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devflow
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: devflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U devflow"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      DATABASE_URL: postgres://devflow:${{ secrets.DB_PASSWORD }}@localhost:5432/devflow
      DATABASE_URL_TEST: postgres://devflow:${{ secrets.DB_PASSWORD }}@localhost:5432/devflow_test
      DATABASE_URL_ADMIN: postgres://devflow:${{ secrets.DB_PASSWORD }}@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          # Variables (non-secret): repo config + provider endpoint/model + bot slug.
          DEVFLOW_APP_ID:            ${{ vars.DEVFLOW_APP_ID }}
          DEVFLOW_GITHUB_APP_SLUG:   ${{ vars.DEVFLOW_GITHUB_APP_SLUG }}
          DEVFLOW_PROVIDER_BASE_URL: ${{ vars.DEVFLOW_PROVIDER_BASE_URL }}
          DEVFLOW_PROVIDER_MODEL:    ${{ vars.DEVFLOW_PROVIDER_MODEL }}
          DEVFLOW_REPO_OWNER:        ${{ vars.DEVFLOW_REPO_OWNER }}
          DEVFLOW_REPO_NAME:         ${{ vars.DEVFLOW_REPO_NAME }}
          DEVFLOW_PEM_PATH:          ${{ vars.DEVFLOW_PEM_PATH }}
          # Secrets (sensitive): DB password, webhook secret, GitHub App creds, provider key.
          POSTGRES_PASSWORD:            ${{ secrets.POSTGRES_PASSWORD }}
          DEVFLOW_WEBHOOK_SECRET:       ${{ secrets.DEVFLOW_WEBHOOK_SECRET }}
          DEVFLOW_APP_INSTALLATION_ID:  ${{ secrets.DEVFLOW_APP_INSTALLATION_ID }}
          DEVFLOW_PROVIDER_API_KEY:     ${{ secrets.DEVFLOW_PROVIDER_API_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Forwarded to the remote shell's env; deploy.sh writes them into .env.
          envs: DEVFLOW_APP_ID,DEVFLOW_GITHUB_APP_SLUG,DEVFLOW_PROVIDER_BASE_URL,DEVFLOW_PROVIDER_MODEL,DEVFLOW_REPO_OWNER,DEVFLOW_REPO_NAME,DEVFLOW_PEM_PATH,POSTGRES_PASSWORD,DEVFLOW_WEBHOOK_SECRET,DEVFLOW_APP_INSTALLATION_ID,DEVFLOW_PROVIDER_API_KEY
          script: |
            set -euo pipefail
            REPO_DIR="${DEPLOY_REPO_DIR:-$HOME/devflow}"
            if [ ! -d "$REPO_DIR/.git" ]; then
              # Merge stderr into stdout: drone-ssh can drop git's final stderr
              # line, which makes a failed clone look like a bare "exit 1".
              git clone https://github.com/Morboz/devflow.git "$REPO_DIR" 2>&1
            else
              # Sync before running deploy.sh: a push that changes deploy.sh
              # itself must execute the NEW version on this run, not the stale
              # one already on disk.
              git -C "$REPO_DIR" fetch --all --prune
              git -C "$REPO_DIR" reset --hard origin/main
            fi
            bash "$REPO_DIR/scripts/deploy.sh"
